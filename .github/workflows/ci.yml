name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - run: npm ci
        working-directory: agent
      - run: npm run check
        working-directory: agent
      - run: npm test
        working-directory: agent
      - run: npm run build
        working-directory: agent
